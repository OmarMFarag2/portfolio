<section class="d-flex w-100 flex-column justify-content-center" id="skills">
    <div class="">
        <div class="text-center">
            <h2 class="display-5 fw-bold mb-3">Technical <span class="text-tertiary-custom">Skills</span></h2>
            <p class="text-on-surface-variant mx-auto" style="max-width: 512px;">
                A curated selection of technologies and methodologies I use to bring vision to life.
            </p>
        </div>
        <!-- Bento-style Skills Grid -->
        <div class="row">
            @for (skill of skillList; track skill) {
            <div class="col-md-6 px-2 py-2">
                <div class="glass-card p-4 p-md-4 rounded-4 d-flex flex-column justify-content-between">
                    <div class="mb-5">
                        <h3 class="h4 fw-bold mb-2">{{skill.name}}</h3>
                        <p class="text-on-surface-variant mb-0">{{skill.desc}}</p>
                    </div>
                    <div class="d-flex flex-wrap gap-2">
                        @for (tag of skill.tags; track tag) {
                        <span class="badge-pill-custom badge-tertiary py-1 px-2" style="font-size: 10px;">{{tag}}</span>}
                    </div>
                </div>
            </div>}


        </div>
    </div>
</section>
