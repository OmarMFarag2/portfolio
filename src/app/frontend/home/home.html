<section class="d-flex flex-column justify-content-center">

    @if(home){
    <div class="row align-items-center">
        <div class="col-xl-8">
            <!-- Status Pill -->
            <div class="d-inline-flex align-items-center gap-2 px-3 py-1 mb-4 rounded-pill border border-tertiary border-opacity-25"
                style="background: rgba(255, 175, 211, 0.1); color: var(--tertiary-color);">
                <span class="pulse-dot"></span>
                <span class="font-label-caps">Available for projects</span>
            </div>
            <!-- Headline -->
            <h1 class="hero-display mb-4">
                {{home.title.split(".")[0]}}.
                <span class="fst-italic" style="color: var(--primary-color);">{{home.keyword}} </span>
                {{home.title.split(".")[1]}}
            </h1>
            <!-- Subheadline -->
            <p class="fs-5 mb-5 opacity-75" style="max-width: 650px; color: var(--text-muted);">
                {{home.desc}}
            </p>
            <!-- Actions -->
            <div class="d-flex flex-column flex-sm-row gap-4">
                <button routerLink="/projects"
                    class="rounded-pill btn-secondary-custom font-label-caps d-flex align-items-center gap-2">
                    Explore My Work
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
                <button class="rounded-pill download  btn-primary-custom font-label-caps">
                    <a download target="_blank" [href]="'http://localhost:3000/files/' + home.cv">View Resume</a>

                </button>
            </div>
        </div>
        <!-- Hero Visual -->
        <div class="col-xl-4 d-none d-xl-block">
            <div class="hero-img-container glass-card rounded-4 overflow-hidden animate-float">
                <div class="hero-img-overlay"></div>
                <img alt="Futuristic glass sculpture macro" class="w-100 h-100 object-fit-cover"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuBJhaSsFXWTemJ-jDsPyLc5ESJjHeHR3eIP_IhmkDPbZrsHaYKkaPeyWHr4YAJhwAOhLCoHfjdTNOPmbZ5YnjXNkw2uCAlKSmmu5x2c7RsLVKiIj3MgCBcE5gJg27tp2OchZZJfQRd-Wx6ufH4oJYjir88R0bQpuazhSroN9s8bRF2k1isI11kaM6q5mTH5WFIWwUtPzeJDGiJZ5w8on9A0fjRZva6ObkL6pDE1eruWRzfsLOB1YxiVofebm6dL4LxcpiDcrVr9nNZd" />
            </div>
        </div>
    </div>}
</section>
